name: package-twinbox-core

on:
  push:
    branches: [master, dev-go]
  pull_request:

jobs:
  tarball:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create twinbox_core tarball
        run: bash scripts/package_vendor_tarball.sh
      - uses: actions/upload-artifact@v4
        with:
          name: twinbox_core-tarball
          path: dist/*.tar.gz
