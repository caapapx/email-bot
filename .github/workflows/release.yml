# Build twinbox CLI for Linux x86_64, Linux arm64, Windows x86_64 + vendor core tarball → GitHub Release.
#
# Trigger:
#   - Push tag v* (e.g. v0.1.0)
#   - Or: Actions → Release → Run workflow (existing tag)
#
# Artifacts:
#   - twinbox-<tag>-linux-x86_64
#   - twinbox-<tag>-linux-arm64
#   - twinbox-<tag>-windows-amd64.exe
#   - twinbox_core-<version>.tar.gz (same for all platforms; Python/OpenClaw bundle)
#   - SHA256SUMS.txt
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Parse version from pyproject.toml
        id: ver
        run: |
          V=$(grep -E '^version[[:space:]]*=' pyproject.toml | head -1 | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          echo "pyproject_version=$V" >> "$GITHUB_OUTPUT"
          echo "pyproject_version=$V"

      # go.mod lives in cmd/twinbox-go; build from that module root (not repo root).
      - name: Build CLI — Linux x86_64 (amd64)
        working-directory: cmd/twinbox-go
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p ../../dist
          go build -o "../../dist/twinbox-${RELEASE_TAG}-linux-x86_64" .
          chmod +x "../../dist/twinbox-${RELEASE_TAG}-linux-x86_64"

      - name: Build CLI — Linux arm64
        working-directory: cmd/twinbox-go
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: |
          go build -o "../../dist/twinbox-${RELEASE_TAG}-linux-arm64" .
          chmod +x "../../dist/twinbox-${RELEASE_TAG}-linux-arm64"

      - name: Build CLI — Windows x86_64 (amd64)
        working-directory: cmd/twinbox-go
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: amd64
        run: go build -o "../../dist/twinbox-${RELEASE_TAG}-windows-amd64.exe" .

      - name: Package vendor core tarball
        run: bash scripts/package_vendor_tarball.sh

      - name: SHA256 checksums
        working-directory: dist
        run: |
          shopt -s nullglob
          sha256sum \
            "twinbox-${RELEASE_TAG}-linux-x86_64" \
            "twinbox-${RELEASE_TAG}-linux-arm64" \
            "twinbox-${RELEASE_TAG}-windows-amd64.exe" \
            twinbox_core-*.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt
          ls -la

      - name: Write release notes
        env:
          REPO: ${{ github.repository }}
          VER: ${{ steps.ver.outputs.pyproject_version }}
        run: |
          cat > /tmp/release-notes.md << EOF
          Prebuilt **twinbox** CLI (Go, \`CGO_ENABLED=0\`) plus one **vendor core** tarball (Python + OpenClaw assets).

          | CLI artifact | OS / arch |
          |--------------|-----------|
          | \`twinbox-${RELEASE_TAG}-linux-x86_64\` | Linux **x86_64** (\`amd64\`) |
          | \`twinbox-${RELEASE_TAG}-linux-arm64\` | Linux **arm64** (\`aarch64\`) |
          | \`twinbox-${RELEASE_TAG}-windows-amd64.exe\` | Windows **x86_64** (\`amd64\`) |

          | Other | Description |
          |-------|-------------|
          | \`twinbox_core-${VER}.tar.gz\` | Same bundle for all platforms; use with \`twinbox install --archive\` on a machine with **Python ≥ 3.11** |
          | \`SHA256SUMS.txt\` | \`sha256sum\` for all of the above |

          **Linux (amd64) example**

          \`\`\`bash
          curl -sLO https://github.com/${REPO}/releases/download/${RELEASE_TAG}/twinbox-${RELEASE_TAG}-linux-x86_64
          chmod +x twinbox-${RELEASE_TAG}-linux-x86_64
          mv twinbox-${RELEASE_TAG}-linux-x86_64 ~/.local/bin/twinbox
          \`\`\`

          **Linux (arm64) example**

          \`\`\`bash
          curl -sLO https://github.com/${REPO}/releases/download/${RELEASE_TAG}/twinbox-${RELEASE_TAG}-linux-arm64
          chmod +x twinbox-${RELEASE_TAG}-linux-arm64
          mv twinbox-${RELEASE_TAG}-linux-arm64 ~/.local/bin/twinbox
          \`\`\`

          **Windows:** download \`.exe\`, place on \`PATH\`, run from **cmd** or **PowerShell**.

          Deploy / archive usage: \`integrations/openclaw/DEPLOY.md\` on the default branch.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "${{ env.RELEASE_TAG }} (CLI: Linux amd64/arm64, Windows amd64)"
          body_path: /tmp/release-notes.md
          files: |
            dist/twinbox-${{ env.RELEASE_TAG }}-linux-x86_64
            dist/twinbox-${{ env.RELEASE_TAG }}-linux-arm64
            dist/twinbox-${{ env.RELEASE_TAG }}-windows-amd64.exe
            dist/twinbox_core-${{ steps.ver.outputs.pyproject_version }}.tar.gz
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
