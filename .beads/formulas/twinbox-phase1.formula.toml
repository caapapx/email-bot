formula = "twinbox-phase1"
type = "workflow"
version = 2
description = """
Phase 1: Intent 分类 — 先同步 polecat worktree 到最新 origin/master，
再执行 loading 拉取 envelope + body 采样，最后由 thinking 做 LLM batch intent 分类。
"""

[[steps]]
id = "sync-workspace"
title = "Sync Workspace To origin/master"
description = """
在项目根目录先同步当前 polecat worktree，避免 worktree 基于旧 commit 缺少最新脚本。

```bash
git fetch origin master
if git merge-base --is-ancestor HEAD origin/master; then
  git merge --ff-only origin/master
else
  git rebase origin/master
fi
git merge-base --is-ancestor origin/master HEAD
git rev-parse --short HEAD
git rev-parse --short origin/master
```

验证：当前分支已经 fast-forward 或 rebase 到 `origin/master` 之上。
注意：这个 step 只能同步远端最新提交；如果源码仓库本地 `master` 还有未 push 的 commit，
必须先在源码仓库执行 `git push origin master` 再 sling。
此步骤为 pre-step，不占 polecat session。
"""

[[steps]]
id = "loading"
title = "Phase 1 Loading"
needs = ["sync-workspace"]
description = """
确定性数据拉取 + 结构化。拉取 envelope、body 采样、构建 context-pack。

```bash
bash scripts/phase1_loading.sh
```

产出：`runtime/context/phase1-context.json`
此步骤为 pre-step，不占 polecat session。
"""

[[steps]]
id = "thinking"
title = "Phase 1 Thinking — Intent Classification"
needs = ["loading"]
description = """
读取 loading 产出的 context-pack，调用 LLM 做 batch intent 分类。

```bash
bash scripts/phase1_thinking.sh
```

产出：`runtime/validation/phase-1/` 下的 intent 分类结果（JSON + report）。
每条 intent 带 confidence + evidence chain。
"""
