formula = "twinbox-phase2"
type = "workflow"
version = 4
description = """
Phase 2: Persona 推断执行单。

目标：消费 Phase 1 结果与可选人工上下文，产出 persona/business hypotheses。
这是执行既有脚本的任务，不是重新研究 twinbox 或邮件系统。

运行时根目录规则：
- 脚本从当前 checkout 读取代码（code root）
- `.env`、`runtime/`、`docs/validation/` 从 canonical root 读取和写入（state root）
- 解析顺序：`TWINBOX_CANONICAL_ROOT` -> `~/.config/twinbox/canonical-root` -> 当前 checkout（仅普通仓库）
- linked worktree 未配置 canonical root 时，loading/thinking 都应直接失败

默认执行路径：
1. 同步当前 worktree 到最新 `origin/master`
2. 运行 `bash scripts/phase2_loading.sh`
3. 确认 `runtime/validation/phase-2/context-pack.json` 已生成
4. 运行 `bash scripts/phase2_thinking.sh`
5. 确认 persona/business/report/diagram 已生成

最小必读材料：
- 当前 formula
- `scripts/phase2_loading.sh`
- `scripts/phase2_thinking.sh`
- canonical root 下 `runtime/validation/phase-1/` 的现有产物（仅作为脚本输入，不需要人工通读）
- canonical root 下的 `runtime/validation/phase-2/context-pack.json`（仅在 loading 成功后）

不要先读 README、Phase 3/4 脚本、架构报告或方案文档。
只有命令失败时，才回读当前 step 指定脚本和输入文件。
"""

[[steps]]
id = "sync-workspace"
title = "Sync Workspace To origin/master"
description = """
在项目根目录先同步当前 polecat worktree。这是第一步；不要在同步前浏览仓库其他文件。

```bash
git fetch origin master
if git merge-base --is-ancestor HEAD origin/master; then
  git merge --ff-only origin/master
else
  git rebase origin/master
fi
git merge-base --is-ancestor origin/master HEAD
git rev-parse --short HEAD
git rev-parse --short origin/master
```

验证：当前分支已经 fast-forward 或 rebase 到 `origin/master` 之上。
注意：这个 step 只能同步远端最新提交；如果源码仓库本地 `master` 还有未 push 的 commit，
必须先在源码仓库执行 `git push origin master` 再 sling。
如果这里失败，只报告 git 同步问题，不要继续进入 loading。
此步骤为 pre-step，不占 polecat session。
"""

[[steps]]
id = "loading"
title = "Phase 2 Loading"
needs = ["sync-workspace"]
description = """
目的：读取 Phase 1 输出和可选人工上下文，构建 Phase 2 thinking 所需的 enriched context pack。

```bash
bash scripts/phase2_loading.sh
```

成功条件：
- canonical root 下的 `runtime/validation/phase-2/context-pack.json` 存在

失败时只检查：
- `scripts/phase2_loading.sh`
- `runtime/validation/phase-1/mailbox-census.json`
- `runtime/validation/phase-1/raw/sample-bodies.json`
- `runtime/validation/phase-1/raw/envelopes-merged.json`

失败分流：
- linked worktree 缺 canonical root：先在源码 checkout 执行 `bash scripts/register_canonical_root.sh`
- Phase 1 输入缺失：报告“先跑 Phase 1”
- optional 人工上下文缺失：允许继续，不视为错误
- 不要跳去读 persona/lifecycle 设计文档

此步骤为 pre-step，不占 polecat session。
"""

[[steps]]
id = "thinking"
title = "Phase 2 Thinking — Persona Inference"
needs = ["loading"]
description = """
目的：读取 canonical root 下的 `runtime/validation/phase-2/context-pack.json`，单次 LLM 推断 persona + business hypotheses。
不要自己总结业务背景；脚本里的 prompt 已经定义了输出结构。

```bash
bash scripts/phase2_thinking.sh
```

成功条件：
- `runtime/validation/phase-2/persona-hypotheses.yaml`
- `runtime/validation/phase-2/business-hypotheses.yaml`
- `runtime/validation/phase-2/llm-response.json`
- `docs/validation/phase-2-report.md`
- `docs/validation/diagrams/phase-2-relationship-map.mmd`

失败时只检查：
- `scripts/phase2_thinking.sh`
- canonical root 下的 `runtime/validation/phase-2/context-pack.json`

失败分流：
- context-pack 缺失：说明 loading 未完成
- LLM backend/鉴权失败：报告 API 问题
- 不要继续探索 Phase 3/4，也不要读报告文档找“业务含义”
"""
