formula = "twinbox-phase4"
type = "workflow"
version = 5
description = """
Phase 4: Value 输出 — 这是一个 EXECUTION formula，每个 step 必须实际运行脚本。
先同步 polecat worktree 到最新 origin/master，然后 loading 构建 context-pack，thinking 拆为 3 个并行子任务：
urgent+pending / sla-risks / weekly-brief，最后合并输出。

重要：此 formula 的目标是 RUN 脚本产生输出文件，不是审查或编写代码。
所有脚本使用相对路径，在项目根目录下执行即可。
"""

[[steps]]
id = "sync-workspace"
title = "Sync Workspace To origin/master — EXECUTE"
description = """
ACTION: 在项目根目录先同步当前 polecat worktree，避免 worktree 基于旧 commit 缺少最新脚本。

```bash
git fetch origin master
if git merge-base --is-ancestor HEAD origin/master; then
  git merge --ff-only origin/master
else
  git rebase origin/master
fi
git merge-base --is-ancestor origin/master HEAD
git rev-parse --short HEAD
git rev-parse --short origin/master
```

验证：当前分支已经 fast-forward 或 rebase 到 `origin/master` 之上。
注意：这个 step 只能同步远端最新提交；如果源码仓库本地 `master` 还有未 push 的 commit，
必须先在源码仓库执行 `git push origin master` 再 sling。
"""

[[steps]]
id = "loading"
title = "Phase 4 Loading — EXECUTE"
needs = ["sync-workspace"]
description = """
ACTION: 在项目根目录运行以下命令，等待完成，验证产出文件存在。

```bash
bash scripts/phase4_loading.sh
```

验证：确认 `runtime/validation/phase-4/context-pack.json` 存在且非空。
如果失败，检查 .env 配置和网络连接。
"""

[[steps]]
id = "think-urgent"
title = "Phase 4 Thinking — Urgent + Pending — EXECUTE"
needs = ["loading"]
description = """
ACTION: 在项目根目录运行以下命令，等待 LLM 返回（可能需要 2-3 分钟）。

```bash
bash scripts/phase4_think_urgent.sh
```

验证：确认 `runtime/validation/phase-4/urgent-pending-raw.json` 存在且包含有效 JSON。
"""

[[steps]]
id = "think-sla"
title = "Phase 4 Thinking — SLA Risks — EXECUTE"
needs = ["loading"]
description = """
ACTION: 在项目根目录运行以下命令，等待 LLM 返回（可能需要 2-3 分钟）。

```bash
bash scripts/phase4_think_sla.sh
```

验证：确认 `runtime/validation/phase-4/sla-risks-raw.json` 存在且包含有效 JSON。
"""

[[steps]]
id = "think-brief"
title = "Phase 4 Thinking — Weekly Brief — EXECUTE"
needs = ["loading"]
description = """
ACTION: 在项目根目录运行以下命令，等待 LLM 返回（可能需要 2-3 分钟）。

```bash
bash scripts/phase4_think_brief.sh
```

验证：确认 `runtime/validation/phase-4/weekly-brief-raw.json` 存在且包含有效 JSON。
"""

[[steps]]
id = "merge"
title = "Phase 4 Merge — Combine Outputs — EXECUTE"
needs = ["think-urgent", "think-sla", "think-brief"]
description = """
ACTION: 在项目根目录运行以下命令合并 3 个子任务的输出（纯合并，不调 LLM）。

```bash
bash scripts/phase4_merge.sh
```

验证：确认以下文件全部存在：
- runtime/validation/phase-4/daily-urgent.yaml
- runtime/validation/phase-4/pending-replies.yaml
- runtime/validation/phase-4/sla-risks.yaml
- runtime/validation/phase-4/weekly-brief.md
- docs/validation/phase-4-report.md
"""
