formula = "twinbox-phase4"
type = "workflow"
version = 6
description = """
Phase 4: Value 输出执行单。

目标：执行现有 Phase 4 分拆脚本，生成 urgent/pending、sla-risks、weekly brief 和最终 report。
这是纯执行任务，不是代码审查，不是架构探索，也不是重新选择脚本。
这个 formula 现在作为单 polecat fallback；如果要让 3 个 think 子任务分别分发到 3 个 Gastown session，
优先使用：
- `twinbox-phase4-loading`
- `twinbox-phase4-think-urgent`
- `twinbox-phase4-think-sla`
- `twinbox-phase4-think-brief`
- `twinbox-phase4-merge`

固定执行路径：
1. 同步当前 worktree 到最新 `origin/master`
2. 运行 `bash scripts/phase4_loading.sh`
3. 并行/依次运行：
   - `bash scripts/phase4_think_urgent.sh`
   - `bash scripts/phase4_think_sla.sh`
   - `bash scripts/phase4_think_brief.sh`
4. 运行 `bash scripts/phase4_merge.sh`

重要约束：
- 在这个 formula 里不要运行 `scripts/phase4_thinking_parallel.sh`
- merge step 只做 raw JSON → YAML/MD 合并，不调 LLM
- 不要先读 README、reports、历史性能分析，除非当前命令失败且 formula 明确要求

最小必读材料：
- 当前 formula
- `scripts/phase4_loading.sh`
- `scripts/phase4_think_urgent.sh`
- `scripts/phase4_think_sla.sh`
- `scripts/phase4_think_brief.sh`
- `scripts/phase4_merge.sh`
- `scripts/llm_common.sh`（仅当 think 子任务失败时）
"""

[[steps]]
id = "sync-workspace"
title = "Sync Workspace To origin/master — EXECUTE"
description = """
ACTION: 在项目根目录先同步当前 polecat worktree。这是第一步；不要在同步前浏览仓库其他文件。

```bash
git fetch origin master
if git merge-base --is-ancestor HEAD origin/master; then
  git merge --ff-only origin/master
else
  git rebase origin/master
fi
git merge-base --is-ancestor origin/master HEAD
git rev-parse --short HEAD
git rev-parse --short origin/master
```

验证：当前分支已经 fast-forward 或 rebase 到 `origin/master` 之上。
注意：这个 step 只能同步远端最新提交；如果源码仓库本地 `master` 还有未 push 的 commit，
必须先在源码仓库执行 `git push origin master` 再 sling。
如果这里失败，只报告 git 同步问题，不要继续进入 loading。
"""

[[steps]]
id = "loading"
title = "Phase 4 Loading — EXECUTE"
needs = ["sync-workspace"]
description = """
ACTION: 在项目根目录构建 Phase 4 context-pack。此步骤是确定性 I/O，不调 LLM。

```bash
bash scripts/phase4_loading.sh
```

成功条件：
- `runtime/validation/phase-4/context-pack.json` 存在且非空

失败时只检查：
- `scripts/phase4_loading.sh`
- `runtime/validation/phase-1/raw/envelopes-merged.json`
- `runtime/validation/phase-3/thread-stage-samples.json`

失败分流：
- Phase 1/3 输入缺失：报告“先跑上游 phase”
- `.env` / `himalaya` / mailbox 拉取失败：报告环境或 I/O 问题
- 不要提前进入 think/merge，也不要改成运行 `phase4_thinking_parallel.sh`
"""

[[steps]]
id = "think-urgent"
title = "Phase 4 Thinking — Urgent + Pending — EXECUTE"
needs = ["loading"]
description = """
ACTION: 只运行 urgent+pending 子任务，写出 raw JSON。不要顺手运行其他 think 脚本。

```bash
bash scripts/phase4_think_urgent.sh
```

成功条件：
- `runtime/validation/phase-4/urgent-pending-raw.json` 存在且是有效 JSON

失败时只检查：
- `scripts/phase4_think_urgent.sh`
- `scripts/llm_common.sh`
- `runtime/validation/phase-4/context-pack.json`

失败分流：
- context-pack 缺失：说明 loading 未完成
- LLM backend/限流/解析失败：报告 API 问题
- 不要改跑串行大脚本，也不要去读其他 phase 文档
"""

[[steps]]
id = "think-sla"
title = "Phase 4 Thinking — SLA Risks — EXECUTE"
needs = ["loading"]
description = """
ACTION: 只运行 SLA risks 子任务，写出 raw JSON。不要顺手运行其他 think 脚本。

```bash
bash scripts/phase4_think_sla.sh
```

成功条件：
- `runtime/validation/phase-4/sla-risks-raw.json` 存在且是有效 JSON

失败时只检查：
- `scripts/phase4_think_sla.sh`
- `scripts/llm_common.sh`
- `runtime/validation/phase-4/context-pack.json`

失败分流：
- context-pack 缺失：说明 loading 未完成
- LLM backend/限流/解析失败：报告 API 问题
"""

[[steps]]
id = "think-brief"
title = "Phase 4 Thinking — Weekly Brief — EXECUTE"
needs = ["loading"]
description = """
ACTION: 只运行 weekly brief 子任务，写出 raw JSON。不要顺手运行其他 think 脚本。

```bash
bash scripts/phase4_think_brief.sh
```

成功条件：
- `runtime/validation/phase-4/weekly-brief-raw.json` 存在且是有效 JSON

失败时只检查：
- `scripts/phase4_think_brief.sh`
- `scripts/llm_common.sh`
- `runtime/validation/phase-4/context-pack.json`

失败分流：
- context-pack 缺失：说明 loading 未完成
- LLM backend/限流/解析失败：报告 API 问题
"""

[[steps]]
id = "merge"
title = "Phase 4 Merge — Combine Outputs — EXECUTE"
needs = ["think-urgent", "think-sla", "think-brief"]
description = """
ACTION: 只合并 3 个 raw JSON，纯合并，不调 LLM，也不要重新运行任何 think 脚本。

```bash
bash scripts/phase4_merge.sh
```

成功条件：确认以下文件全部存在：
- runtime/validation/phase-4/daily-urgent.yaml
- runtime/validation/phase-4/pending-replies.yaml
- runtime/validation/phase-4/sla-risks.yaml
- runtime/validation/phase-4/weekly-brief.md
- docs/validation/phase-4-report.md

失败时只检查：
- `scripts/phase4_merge.sh`
- 3 个 `*-raw.json`

失败分流：
- raw JSON 缺失：返回缺失的 think step
- 不要改跑 `phase4_thinking_parallel.sh`
"""
