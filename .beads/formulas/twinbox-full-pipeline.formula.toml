formula = "twinbox-full-pipeline"
type = "workflow"
version = 4
description = """
twinbox 全流程 pipeline 执行单。

目标：按 phase 顺序执行现有 Phase 1-4 脚本链路（loading → thinking），生成 attention-budget 所需的完整输入。

运行时根目录规则：
- 脚本从当前 checkout 读取代码（code root）
- `.env`、`runtime/`、`docs/validation/` 从 canonical root 读取和写入（state root）
- 解析顺序：`TWINBOX_CANONICAL_ROOT` -> `~/.config/twinbox/canonical-root` -> 当前 checkout（仅普通仓库）

数据依赖：
- Phase 2 依赖 Phase 1 产出
- Phase 3 依赖 Phase 1 + Phase 2 产出
- Phase 4 依赖 Phase 1 + Phase 2 + Phase 3 产出

执行前提：源码仓库的 `master` 必须已经 `git push origin master`。

不要先读 README、方案文档、历史报告；每个 step 只执行当前 description 指定的命令。
"""

[[steps]]
id = "sync-workspace"
title = "Sync Workspace To origin/master"
description = """
在项目根目录先同步当前 polecat worktree。这是第一步；不要在同步前浏览仓库其他文件。

```bash
git fetch origin master
if git merge-base --is-ancestor HEAD origin/master; then
  git merge --ff-only origin/master
else
  git rebase origin/master
fi
git merge-base --is-ancestor origin/master HEAD
git rev-parse --short HEAD
git rev-parse --short origin/master
```

验证：当前分支已经 fast-forward 或 rebase 到 `origin/master` 之上。
此步骤为 pre-step，不占 polecat session。
"""

[[steps]]
id = "phase1"
title = "Phase 1 — Intent Classification"
needs = ["sync-workspace"]
description = """
执行 Phase 1 的 loading → thinking 全流程。
只关心 Phase 1 输入和输出，不要推断后续 phase 逻辑。

```bash
bash scripts/phase1_loading.sh
bash scripts/phase1_thinking.sh
```

产出验证：
- `runtime/context/phase1-context.json`
- `runtime/validation/phase-1/intent-classification.json`
- `runtime/validation/phase-1/intent-report.md`

此步骤为 pre-step，不占 polecat session。
"""

[[steps]]
id = "phase2"
title = "Phase 2 — Persona Inference"
needs = ["phase1"]
description = """
执行 Phase 2 的 loading → thinking 全流程。
依赖 Phase 1 产出。

```bash
bash scripts/phase2_loading.sh
bash scripts/phase2_thinking.sh
```

产出验证：
- `runtime/validation/phase-2/context-pack.json`
- `runtime/validation/phase-2/persona-hypotheses.yaml`
- `runtime/validation/phase-2/business-hypotheses.yaml`

此步骤为 pre-step，不占 polecat session。
"""

[[steps]]
id = "phase3"
title = "Phase 3 — Lifecycle Modeling"
needs = ["phase2"]
description = """
执行 Phase 3 的 loading → thinking 全流程。
依赖 Phase 1 + Phase 2 产出。

```bash
bash scripts/phase3_loading.sh
bash scripts/phase3_thinking.sh
```

产出验证：
- `runtime/validation/phase-3/context-pack.json`
- `runtime/validation/phase-3/lifecycle-model.yaml`
- `runtime/validation/phase-3/thread-stage-samples.json`

此步骤为 pre-step，不占 polecat session。
"""

[[steps]]
id = "phase4"
title = "Phase 4 — Value Outputs"
needs = ["phase3"]
description = """
执行 Phase 4 的 loading → thinking 全流程。
依赖 Phase 1 + Phase 2 + Phase 3 产出。

```bash
bash scripts/phase4_loading.sh
bash scripts/phase4_thinking_parallel.sh
```

产出验证：
- `runtime/validation/phase-4/context-pack.json`
- `runtime/validation/phase-4/daily-urgent.yaml`
- `runtime/validation/phase-4/pending-replies.yaml`
- `runtime/validation/phase-4/sla-risks.yaml`
- `runtime/validation/phase-4/weekly-brief.md`

此步骤为 pre-step，不占 polecat session。
"""
