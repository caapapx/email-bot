formula = "twinbox-phase4-merge"
type = "workflow"
version = 1
description = """
Phase 4 merge 执行单。

目标：只合并 3 个 think 子任务的 raw JSON，生成最终 YAML/MD 报告。
这是纯合并步骤，不调 LLM，不要回头重跑 think 脚本。

最小必读材料：
- 当前 formula
- `scripts/phase4_merge.sh`
"""

[[steps]]
id = "sync-workspace"
title = "Sync Workspace To origin/master — EXECUTE"
description = """
ACTION: 在项目根目录同步当前 polecat worktree 到最新 `origin/master`。

```bash
git fetch origin master
if git merge-base --is-ancestor HEAD origin/master; then
  git merge --ff-only origin/master
else
  git rebase origin/master
fi
git merge-base --is-ancestor origin/master HEAD
```

如果同步失败，只报告 git 问题。
"""

[[steps]]
id = "merge"
title = "Phase 4 Merge — EXECUTE"
needs = ["sync-workspace"]
description = """
ACTION: 只运行 merge 脚本。

```bash
bash scripts/phase4_merge.sh
```

成功条件：
- `runtime/validation/phase-4/daily-urgent.yaml`
- `runtime/validation/phase-4/pending-replies.yaml`
- `runtime/validation/phase-4/sla-risks.yaml`
- `runtime/validation/phase-4/weekly-brief.md`
- `docs/validation/phase-4-report.md`

失败时只检查：
- `scripts/phase4_merge.sh`
- `runtime/validation/phase-4/urgent-pending-raw.json`
- `runtime/validation/phase-4/sla-risks-raw.json`
- `runtime/validation/phase-4/weekly-brief-raw.json`
"""
