profile: executive
inherits: default

# 高优先级发件人
important_senders:
  - ceo-office@example.com
  - board@example.com
  - investor@example.com
  - key-client@example.com

ignore_senders:
  - newsletter@
  - events@

# 语言与表达风格
style:
  language: zh-CN
  tone: concise-professional
  summary_format: conclusion-first
  reply_length: short
  sign_off: "Best, {{name}}"

# 行为规则
rules:
  notify_before_hour: 9
  bypass_quiet_hours_if_urgent: true
  require_review_for_all_external_replies: true
  learned_rules_path: config/profiles/rules/executive.md
  confirm_send_token: CONFIRM_SEND

# 摘要内容分区
digest:
  sections:
    - urgent
    - important
    - waiting_for_reply
    - commitments
    - next_actions
  visible_metrics:
    - triaged_count
    - awaiting_human_review
    - estimated_minutes_saved
