profile: recruiter
inherits: default

important_senders:
  - candidate@
  - hiring-manager@example.com
  - agency@example.com

ignore_senders:
  - noreply@

style:
  language: zh-CN
  tone: warm-professional
  summary_format: action-first
  reply_length: medium

rules:
  auto_send_allowed_for_templates: true
  auto_send_templates:
    - interview_invite
    - thank_you
  require_review_for_offer_related_emails: true

digest:
  sections:
    - new_candidates
    - interview_followups
    - pending_feedback
    - offers_and_risks
