version: 1

global:
  auto_send: false
  require_review_for_external_send: true
  require_review_for_high_risk: true
  digest_timezone: Asia/Shanghai
  digest_schedule:
    daily: "0 18 * * 1-5"
    weekly: "0 17 * * 5"

classification:
  urgent_keywords:
    - complaint
    - contract
    - legal
    - payment
    - outage
    - escalation
    - 投诉
    - 合同
    - 法务
    - 付款
    - 故障
    - 升级
  important_keywords:
    - quote
    - proposal
    - partnership
    - follow-up
    - interview
    - 报价
    - 合作
    - 跟进
    - 面试
  ignore_senders:
    - noreply@
    - no-reply@
    - notification@
  ignore_subject_patterns:
    - "^Out of Office"
    - "^Auto Reply"

actions:
  urgent:
    notify: true
    draft_reply: true
    create_task: true
    sync_crm: false
  important:
    notify: true
    draft_reply: true
    create_task: false
    sync_crm: false
  normal:
    notify: false
    draft_reply: false
    create_task: false
    sync_crm: false

review:
  high_risk_conditions:
    - contains_attachment
    - contains_legal_keyword
    - sender_not_seen_before
    - external_domain_and_finance_topic

sla:
  urgent_reply_hours: 4
  important_reply_hours: 24
  normal_reply_hours: 72
